    function formatMoney(amount) { return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', minimumFractionDigits: 0 }).format(amount); }

    // AI Sinyal Üretme (RSI ve teknik göstergelere göre)
    function generateSignal(asset) {
        let rsi = asset.rsi || 50;
        let trend = asset.trend;
        if (rsi < 35) return { action: "AL", confidence: 85, entry: asset.price, stop: asset.price * 0.98, target: asset.price * 1.05, riskReward: "1:2.5", reason: "RSI aşırı satım bölgesinde, teknik toparlanma bekleniyor." };
        if (rsi > 70) return { action: "SAT", confidence: 78, entry: asset.price, stop: asset.price * 1.02, target: asset.price * 0.95, riskReward: "1:2", reason: "RSI aşırı alım bölgesinde, kar realizasyonu gelebilir." };
        if (trend === "↑") return { action: "AL", confidence: 65, entry: asset.price, stop: asset.price * 0.99, target: asset.price * 1.03, riskReward: "1:3", reason: "Yükseliş trendi devam ediyor, momentum güçlü." };
        if (trend === "↓") return { action: "SAT", confidence: 60, entry: asset.price, stop: asset.price * 1.01, target: asset.price * 0.98, riskReward: "1:2", reason: "Düşüş trendi devam ediyor, satış baskısı var." };
        return { action: "BEKLE", confidence: 50, entry: asset.price, stop: null, target: null, riskReward: "-", reason: "Piyasa belirsiz, net sinyal yok." };
    }
    
    // Toplam portföy değeri hesaplama
    function calculateTotalPortfolio() {
        return assets.reduce((sum, a) => sum + a.price, 0) * 100;
    }
    
    // Risk skoru hesaplama
    function calculateRiskScore() {
        let avgRsi = assets.reduce((sum, a) => sum + a.rsi, 0) / assets.length;
        if (avgRsi > 70) return { score: 75, level: "Yüksek Risk", color: "red" };
        if (avgRsi > 60) return { score: 55, level: "Orta Risk", color: "yellow" };
        if (avgRsi > 40) return { score: 35, level: "Düşük Risk", color: "green" };
        return { score: 25, level: "Çok Düşük Risk", color: "green" };
    }

    function handleLogin(email, password) {

            currentUser = user;
            isAdmin = user.role === "admin";
            localStorage.setItem("yatirim_user", JSON.stringify(user));
            render();
            return true;
        }
        return false;
    }
    
    function handleRegister(name, email, password) {
        if (users.find(u => u.email === email)) return false;
        let newUser = { id: users.length + 1, email, password, name, role: "user", subscription: "basic", avatar: name[0] };
        users.push(newUser);
        return handleLogin(email, password);
    }

    // ============================================================
    // 10. FOOTER (Bilgileriniz)
    // ============================================================
    function renderFooter() {
        return `<footer class="mt-8 pt-4 border-t border-gold/30 text-center text-gray-400 text-xs"><div class="flex flex-wrap justify-center gap-4 mb-1"><span><i class="fas fa-user-circle text-gold mr-1"></i> CFO.MÜH. Orhan BOYRAZ</span><span><i class="fab fa-whatsapp text-gold mr-1"></i> 0541 866 0202</span><span><i class="fas fa-phone text-gold mr-1"></i> 05409666602</span><span><i class="fas fa-envelope text-gold mr-1"></i> orhanboyraz0216@gmail.com</span><span><i class="fas fa-map-marker-alt text-gold mr-1"></i> Nilüfer / BURSA</span><span><i class="fas fa-globe text-gold mr-1"></i> anadolunetwork.tr</span></div><p>© 2025 Yatırım AI – Yapay Zeka Destekli Yatırım Platformu | Yatırım tavsiyesi değildir. Tüm hakları saklıdır.</p></footer>`;
    }
    
    // ============================================================
    // 11. ANA RENDER
    // ============================================================
    function render() {
        let content = "";
        if (currentPage === "overview") content = renderOverview();
        else if (currentPage === "assets") content = renderAssetsModule();
        else if (currentPage === "technical") content = renderTechnicalModule();
        else if (currentPage === "ai") content = renderAIForecastModule();
        else if (currentPage === "signals") content = renderSignalsModule();
        else if (currentPage === "risk") content = renderRiskModule();
        else if (currentPage === "portfolio") content = renderPortfolioModule();
        else if (currentPage === "alerts") content = renderAlertsModule();
        else if (currentPage === "macro") content = renderMacroModule();
        else if (currentPage === "news") content = renderNewsModule();
        else if (currentPage === "pricing") content = renderPricingModule();
        else if (currentPage === "admin") content = renderAdminModule();
        else if (currentPage === "reports") content = renderReportsModule();
        else content = renderOverview();
        
        const html = `<div class="flex min-h-screen">${renderSidebar()}<main class="flex-1 ml-72 p-6"><div class="max-w-7xl mx-auto">${content}${renderFooter()}</div></main></div>`;
        document.getElementById("app").innerHTML = html;
        
        setTimeout(() => {
            if (currentPage === "technical") { let ctx = document.getElementById('techChart')?.getContext('2d'); if(ctx) new Chart(ctx, { type: 'line', data: { labels: ['1 Gün', '2 Gün', '3 Gün', '4 Gün', '5 Gün', '6 Gün'], datasets: [{ label: 'ALTIN (XAUUSD)', data: [3300,3320,3340,3360,3350,3365], borderColor: '#f5b042', fill: false }] } }); }
            if (currentPage === "portfolio") { let ctx = document.getElementById('portfolioAllocChart')?.getContext('2d'); if(ctx) new Chart(ctx, { type: 'doughnut', data: { labels: ['Altın', 'Hisse', 'ETF', 'Tahvil', 'Nakit', 'Kripto', 'Alternatif'], datasets: [{ data: [25,20,15,15,10,10,5], backgroundColor: ['#f5b042','#e09d2c','#d48a1f','#c27818','#b0680d','#a05a10','#904c0a'] }] }, options: { responsive: true } }); }
        }, 100);
    }
    
    // Başlangıç
    let savedUser = localStorage.getItem("yatirim_user");
    if (savedUser) {
        try {
            currentUser = JSON.parse(savedUser);
            isAdmin = currentUser.role === "admin";
        } catch(e) {}
    }
    render();
    
    window.whatsappLink = whatsappLink;
    window.openAdminPanel = openAdminPanel;
    window.deleteAsset = deleteAsset;
    window.openLoginModal = openLoginModal;
    window.upgradeSubscription = upgradeSubscription;
    window.showToast = showToast;
</script>
</body>
